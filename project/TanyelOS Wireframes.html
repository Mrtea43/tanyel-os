<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TanyelOS — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Architects+Daughter&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: 'Architects Daughter', cursive; }
  * { box-sizing: border-box; }

  /* ───── wireframe primitives ───── */
  .wf {
    --ink: #1d1a16;
    --ink-soft: #4a4640;
    --paper: #fbf9f4;
    --accent: #d2553a;
    --accent-soft: #f3c8b8;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Architects Daughter', cursive;
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
    border: 1.5px solid var(--ink);
    border-radius: 6px;
  }
  .wf .stroke { border: 1.5px solid var(--ink); }
  .wf .stroke-2 { border: 2px solid var(--ink); }
  .wf .dashed { border-style: dashed; }
  .wf .soft { color: var(--ink-soft); }
  .wf .accent { color: var(--accent); }
  .wf .accent-bg { background: var(--accent-soft); }
  .wf .hand { font-family: 'Caveat', cursive; }

  /* sketchy hatched fill */
  .hatch {
    background-image: repeating-linear-gradient(45deg, transparent 0 4px, rgba(29,26,22,0.18) 4px 5px);
  }
  .hatch-dense {
    background-image: repeating-linear-gradient(45deg, transparent 0 2px, rgba(29,26,22,0.25) 2px 3px);
  }
  .hatch-accent {
    background-image: repeating-linear-gradient(45deg, transparent 0 4px, rgba(210,85,58,0.35) 4px 5px);
  }

  /* placeholder image: X across a box */
  .ph {
    position: relative;
    background: #fff;
    border: 1.5px solid var(--ink);
  }
  .ph::before, .ph::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to top right, transparent calc(50% - 1px), var(--ink) 50%, transparent calc(50% + 1px));
  }
  .ph::after {
    background: linear-gradient(to top left, transparent calc(50% - 1px), var(--ink) 50%, transparent calc(50% + 1px));
  }

  .icon-box {
    width: 56px; display: flex; flex-direction: column; align-items: center; gap: 4px;
    text-align: center;
    cursor: default;
  }
  .icon-box .glyph {
    width: 44px; height: 44px; border: 1.5px solid var(--ink); background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat'; font-size: 20px;
  }
  .icon-box .lbl {
    font-size: 11px; line-height: 1.1; color: var(--ink);
  }

  .win {
    position: absolute;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    box-shadow: 4px 4px 0 0 rgba(29,26,22,0.18);
    display: flex; flex-direction: column;
  }
  .win .titlebar {
    border-bottom: 1.5px solid var(--ink);
    padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
    font-family: 'Caveat'; font-size: 16px;
  }
  .win .dots { display: flex; gap: 6px; }
  .win .dots span {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--ink); background: #fff;
    display: inline-block;
  }
  .win .body { flex: 1; padding: 10px; overflow: hidden; }

  .annot {
    position: absolute;
    font-family: 'Caveat', cursive;
    font-size: 15px;
    color: var(--accent);
    line-height: 1.05;
  }
  .annot::before {
    content: '';
    display: inline-block;
  }
  .arrow {
    position: absolute;
    pointer-events: none;
  }
  .arrow svg { overflow: visible; }

  /* dock styles */
  .dock-floating {
    position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
    background: var(--paper); border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 6px 10px;
    display: flex; gap: 8px; align-items: center;
    box-shadow: 3px 3px 0 0 rgba(29,26,22,0.18);
  }
  .dock-floating .d {
    width: 32px; height: 32px; border: 1.5px solid var(--ink); background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Caveat'; font-size: 14px;
    border-radius: 6px;
  }
  .dock-floating .d.active { background: var(--accent-soft); }
  .dock-floating .sep { width: 1px; height: 22px; background: var(--ink); opacity: 0.4; }

  .topbar {
    position: absolute; left: 0; right: 0; top: 0; height: 22px;
    border-bottom: 1.5px solid var(--ink);
    display: flex; align-items: center; padding: 0 10px;
    font-family: 'Caveat'; font-size: 13px;
    background: var(--paper);
    gap: 14px;
  }
  .topbar .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }

  /* boot wireframe */
  .scanline {
    background-image: repeating-linear-gradient(0deg, transparent 0 3px, rgba(29,26,22,0.05) 3px 4px);
  }

  /* context menu */
  .ctx {
    position: absolute;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    box-shadow: 3px 3px 0 0 rgba(29,26,22,0.18);
    width: 170px;
    font-family: 'Caveat'; font-size: 15px;
  }
  .ctx .item { padding: 5px 12px; border-bottom: 1px dashed rgba(29,26,22,0.35); }
  .ctx .item:last-child { border-bottom: none; }
  .ctx .sep { height: 1px; background: rgba(29,26,22,0.4); margin: 0; }

  /* start menu */
  .startmenu {
    position: absolute;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    box-shadow: 3px 3px 0 0 rgba(29,26,22,0.18);
    padding: 12px;
  }

  /* notes column */
  .notes {
    font-family: 'Caveat', cursive;
    color: #2a251f;
    line-height: 1.35;
  }
  .notes h4 {
    font-size: 22px; margin: 0 0 6px 0; color: var(--accent);
  }
  .notes ul { margin: 0; padding-left: 18px; font-size: 16px; }
  .notes li { margin-bottom: 4px; }
  .notes p { font-size: 16px; margin: 0 0 8px 0; }

  /* tabs / tab control above artboards in fullscreen */
  .legend {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    font-family: 'Caveat'; font-size: 14px;
    color: var(--ink-soft);
  }
  .legend .swatch {
    width: 14px; height: 14px; border: 1.5px solid var(--ink);
    display: inline-block; vertical-align: middle;
  }
</style>
</head>
