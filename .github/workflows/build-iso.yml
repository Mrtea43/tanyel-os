name: Build TanyelOS ISO

on:
  # Run manually from GitHub → Actions tab → "Run workflow"
  workflow_dispatch:
  # Also run automatically on every push to main
  push:
    branches: [main]
    paths:
      - 'tanyel-theme/iso/**'
      - 'tanyel-theme/gtk-4.0/**'
      - 'tanyel-theme/gtk-3.0/**'
      - 'tanyel-theme/gnome-shell/**'
      - 'tanyel-theme/plymouth/**'
      - 'tanyel-theme/gdm/**'
      - '.github/workflows/build-iso.yml'

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write   # needed to create GitHub Releases

    steps:

      # 1. Check out the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Free up disk space (GitHub runners have ~14 GB free; we need ~10 GB)
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      # 3. Install build dependencies
      - name: Install live-build + deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-efi \
            grub-efi-amd64-bin \
            grub-pc-bin \
            mtools \
            dosfstools \
            curl \
            unzip

      # 4. Build the ISO
      - name: Build TanyelOS ISO
        run: |
          cd tanyel-theme/iso
          sudo bash build.sh
          ls -lh tanyelos-*.iso

      # 5. Compress ISO to stay under GitHub's 2 GB release asset limit
      - name: Compress ISO
        run: |
          cd tanyel-theme/iso
          # gzip is faster than xz but still reduces size ~20%
          gzip -k -9 tanyelos-1.0-amd64.iso
          ls -lh tanyelos-*.iso*

      # 6. Generate checksums
      - name: Generate checksums
        run: |
          cd tanyel-theme/iso
          sha256sum tanyelos-1.0-amd64.iso     > tanyelos-1.0-amd64.iso.sha256
          sha256sum tanyelos-1.0-amd64.iso.gz  >> tanyelos-1.0-amd64.iso.sha256
          cat tanyelos-1.0-amd64.iso.sha256

      # 7. Create a GitHub Release and upload the ISO
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: TanyelOS 1.0 (build ${{ github.run_number }})
          body: |
            ## TanyelOS 1.0

            Automated build from commit `${{ github.sha }}`.

            ### Download
            - **`tanyelos-1.0-amd64.iso`** — boot directly (VMware, VirtualBox, USB)
            - **`tanyelos-1.0-amd64.iso.gz`** — compressed version (unzip before use)

            ### How to use
            **VirtualBox / VMware:**
            1. Create a new VM → Linux → Ubuntu 64-bit
            2. 4 GB RAM · 2 CPU · 25 GB disk
            3. Attach the `.iso` as the optical drive
            4. Boot

            **USB (bare metal):**
            - Flash with [Balena Etcher](https://etcher.balena.io) → boot from USB

            ### Checksums
            ```
            ${{ hashFiles('tanyel-theme/iso/tanyelos-1.0-amd64.iso') }}  tanyelos-1.0-amd64.iso
            ```
          files: |
            tanyel-theme/iso/tanyelos-1.0-amd64.iso
            tanyel-theme/iso/tanyelos-1.0-amd64.iso.gz
            tanyel-theme/iso/tanyelos-1.0-amd64.iso.sha256
          draft: false
          prerelease: false
