name: Build TanyelOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'tanyel-theme/iso/**'
      - '.github/workflows/build-iso.yml'

jobs:
  build:
    name: Build ISO
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install live-build
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build debootstrap squashfs-tools \
            xorriso isolinux syslinux-efi \
            grub-efi-amd64-bin grub-pc-bin \
            mtools dosfstools

      # Cache apt packages so repeat builds are faster
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-noble-${{ hashFiles('tanyel-theme/iso/config/package-lists/*.list.chroot') }}
          restore-keys: apt-noble-

      - name: Build TanyelOS ISO
        run: |
          cd tanyel-theme/iso
          sudo bash build.sh

      - name: Compress ISO
        run: |
          cd tanyel-theme/iso
          gzip -k -1 tanyelos-1.0-amd64.iso
          ls -lh tanyelos-*.iso*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ github.run_number }}
          name: TanyelOS 1.0 (build ${{ github.run_number }})
          body: |
            ## TanyelOS 1.0

            ### Download
            - **`tanyelos-1.0-amd64.iso`** — boot directly in VMware / VirtualBox
            - **`tanyelos-1.0-amd64.iso.gz`** — compressed (unzip before use)

            ### VirtualBox / VMware setup
            1. New VM → Linux → Ubuntu 64-bit
            2. 4 GB RAM · 2 CPU · 25 GB disk
            3. Attach `.iso` as optical drive → Boot
          files: |
            tanyel-theme/iso/tanyelos-1.0-amd64.iso
            tanyel-theme/iso/tanyelos-1.0-amd64.iso.gz
            tanyel-theme/iso/tanyelos-1.0-amd64.iso.sha256
          draft: false
          prerelease: false
